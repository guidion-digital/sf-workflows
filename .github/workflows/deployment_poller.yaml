name: Poll Salesforce Deployment Status

# Reusable poller workflow. Consuming repos should call this on a schedule:
#
#   name: Poll Salesforce Deployments
#   on:
#     schedule:
#       - cron: '*/10 6-19 * * 1-5'
#     workflow_dispatch:
#   jobs:
#     poll:
#       permissions:
#         actions: write
#         contents: read
#       uses: guidion-digital/sf-workflows/.github/workflows/deployment_poller.yaml@v1
#       secrets: inherit

on:
  workflow_call:
  # Direct schedule — uncomment if running the poller standalone in this repo
  # Cron runs in UTC — covers 8:00–20:00 CET (7:00–19:00 UTC) / CEST (6:00–18:00 UTC)
  # schedule:
  #   - cron: '*/10 6-19 * * 1-5'
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: deployment-poller-${{ github.repository }}
  cancel-in-progress: false

jobs:
  find-artifacts:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.find.outputs.matrix }}
      has_pending: ${{ steps.find.outputs.has_pending }}
    steps:
      - name: Find pending deployment artifacts
        id: find
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Searching for pending deployment artifacts..."

          ARTIFACTS=$(gh api "repos/${{ github.repository }}/actions/artifacts?per_page=100" \
            --jq '[.artifacts[] | select(.name | startswith("pending-deployment-")) | {artifact_id: (.id | tostring), artifact_name: .name}]')

          COUNT=$(echo "$ARTIFACTS" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No pending deployments found."
            echo "has_pending=false" >> "$GITHUB_OUTPUT"
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
          else
            echo "Found $COUNT pending deployment(s):"
            echo "$ARTIFACTS" | jq '.'
            echo "has_pending=true" >> "$GITHUB_OUTPUT"
            echo "matrix=$(echo "$ARTIFACTS" | jq -c '{include: .}')" >> "$GITHUB_OUTPUT"
          fi

  process-deployment:
    needs: find-artifacts
    if: needs.find-artifacts.outputs.has_pending == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.find-artifacts.outputs.matrix) }}
      fail-fast: false
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
      SF_LOGIN_URL_DEV: ${{ vars.SF_LOGIN_URL_DEV }}
      SF_USERNAME_DEV: ${{ vars.SF_USERNAME_DEV }}
      SF_CLIENT_ID_DEV: ${{ vars.SF_CLIENT_ID_DEV }}
      SF_CLIENT_KEY_DEV: ${{ secrets.SF_CLIENT_KEY_DEV }}
      SF_LOGIN_URL_ACC: ${{ vars.SF_LOGIN_URL_ACC }}
      SF_USERNAME_ACC: ${{ vars.SF_USERNAME_ACC }}
      SF_CLIENT_ID_ACC: ${{ vars.SF_CLIENT_ID_ACC }}
      SF_CLIENT_KEY_ACC: ${{ secrets.SF_CLIENT_KEY_ACC }}
      SF_LOGIN_URL_PROD: ${{ vars.SF_LOGIN_URL_PROD }}
      SF_USERNAME_PROD: ${{ vars.SF_USERNAME_PROD }}
      SF_CLIENT_ID_PROD: ${{ vars.SF_CLIENT_ID_PROD }}
      SF_CLIENT_KEY_PROD: ${{ secrets.SF_CLIENT_KEY_PROD }}
      CACHE_FLUSH_API_KEY_ACC: ${{ secrets.CACHE_FLUSH_API_KEY_ACC }}
      CACHE_FLUSH_API_KEY_PROD: ${{ secrets.CACHE_FLUSH_API_KEY_PROD }}
      USER_ID_FOR_CACHE_FLUSH: ${{ vars.USER_ID_FOR_CACHE_FLUSH }}
    steps:
      - name: Cache Salesforce CLI
        id: cache-sf
        uses: actions/cache@v4
        with:
          path: ${{ runner.tool_cache }}/sf-cli
          key: sf-cli-stable-linux-x64

      - name: Install Salesforce CLI
        if: steps.cache-sf.outputs.cache-hit != 'true'
        run: |
          wget -q https://developer.salesforce.com/media/salesforce-cli/sf/channels/stable/sf-linux-x64.tar.xz
          mkdir -p "${{ runner.tool_cache }}/sf-cli"
          tar xJf sf-linux-x64.tar.xz -C "${{ runner.tool_cache }}/sf-cli" --strip-components=1
          rm sf-linux-x64.tar.xz

      - name: Add Salesforce CLI to PATH
        run: echo "${{ runner.tool_cache }}/sf-cli/bin" >> "$GITHUB_PATH"

      - name: Download artifact
        id: download
        run: |
          mkdir -p artifact_temp
          if ! gh api "repos/${{ github.repository }}/actions/artifacts/${{ matrix.artifact_id }}/zip" > artifact.zip 2>/dev/null; then
            echo "::warning::Failed to download artifact ${{ matrix.artifact_name }} (likely expired)"
            echo "success=false" >> "$GITHUB_OUTPUT"
            echo "DELETE_ARTIFACT=true" >> "$GITHUB_ENV"
          else
            unzip -o artifact.zip -d artifact_temp
            echo "success=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Parse and validate deployment info
        if: steps.download.outputs.success == 'true'
        id: parse
        run: |
          if [ ! -f artifact_temp/deployment-info.json ]; then
            echo "::error::deployment-info.json not found in artifact ${{ matrix.artifact_name }}"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "DELETE_ARTIFACT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          INFO="artifact_temp/deployment-info.json"
          echo "Deployment info:"
          jq '.' "$INFO"

          MISSING=""
          for FIELD in job_id environment target_org slack_channel; do
            VALUE=$(jq -r --arg f "$FIELD" '.[$f] // empty' "$INFO")
            [ -z "$VALUE" ] && MISSING="$MISSING $FIELD"
          done

          if [ -n "$MISSING" ]; then
            echo "::error::Missing required fields:$MISSING"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            echo "DELETE_ARTIFACT=true" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"

          {
            echo "DEPLOY_JOB_ID=$(jq -r '.job_id' "$INFO")"
            echo "DEPLOY_ENVIRONMENT=$(jq -r '.environment' "$INFO")"
            echo "DEPLOY_ENV_UPPER=$(jq -r '.environment | ascii_upcase' "$INFO")"
            echo "DEPLOY_TARGET_ORG=$(jq -r '.target_org' "$INFO")"
            echo "DEPLOY_SLACK_CHANNEL=$(jq -r '.slack_channel' "$INFO")"
            echo "DEPLOY_SLACK_THREAD_TS=$(jq -r '.slack_thread_ts // empty' "$INFO")"
          } >> "$GITHUB_ENV"

      - name: Authenticate to Salesforce
        if: steps.parse.outputs.valid == 'true'
        run: |
          SF_LOGIN_URL_VAR="SF_LOGIN_URL_${DEPLOY_ENV_UPPER}"
          SF_USERNAME_VAR="SF_USERNAME_${DEPLOY_ENV_UPPER}"
          SF_CLIENT_ID_VAR="SF_CLIENT_ID_${DEPLOY_ENV_UPPER}"
          SF_CLIENT_KEY_VAR="SF_CLIENT_KEY_${DEPLOY_ENV_UPPER}"

          SF_LOGIN_URL="${!SF_LOGIN_URL_VAR}"
          SF_USERNAME="${!SF_USERNAME_VAR}"
          SF_CLIENT_ID="${!SF_CLIENT_ID_VAR}"
          SF_CLIENT_KEY="${!SF_CLIENT_KEY_VAR}"

          if [ -z "$SF_LOGIN_URL" ] || [ -z "$SF_USERNAME" ] || [ -z "$SF_CLIENT_ID" ] || [ -z "$SF_CLIENT_KEY" ]; then
            echo "::error::Missing SF credentials for environment: $DEPLOY_ENVIRONMENT"
            exit 1
          fi

          printf '%s' "$SF_CLIENT_KEY" | base64 -d > jwt-key.key
          sf org login jwt \
            --instance-url "$SF_LOGIN_URL" \
            --username "$SF_USERNAME" \
            --client-id "$SF_CLIENT_ID" \
            --jwt-key-file jwt-key.key \
            --alias "$DEPLOY_TARGET_ORG"
          rm -f jwt-key.key

      - name: Check deployment status
        id: check_status
        if: steps.parse.outputs.valid == 'true'
        run: |
          echo "Checking deployment status for Job ID: $DEPLOY_JOB_ID"
          sf project deploy report \
            --job-id "$DEPLOY_JOB_ID" \
            --target-org "$DEPLOY_TARGET_ORG" \
            --json > deploy_report.json || true

          STATUS=$(jq -r '.result.status // .status // "Unknown"' deploy_report.json 2>/dev/null) || STATUS="Unknown"
          echo "Deployment status: $STATUS"

          if [ "$STATUS" = "Unknown" ]; then
            echo "::warning::Could not determine deployment status. Raw SF CLI output:"
            cat deploy_report.json
          fi

          echo "status=$STATUS" >> "$GITHUB_OUTPUT"

          if [[ "$STATUS" =~ ^(Succeeded|Failed|Canceled)$ ]]; then
            echo "DELETE_ARTIFACT=true" >> "$GITHUB_ENV"
          fi

      - name: Flush cache
        if: steps.check_status.outputs.status == 'Succeeded'
        env:
          FLUSH_CACHE_URL_ACC: ${{ vars.FLUSH_CACHE_URL_ACC }}
          FLUSH_CACHE_URL_PROD: ${{ vars.FLUSH_CACHE_URL_PROD }}
        run: |
          FLUSH_URL_VAR="FLUSH_CACHE_URL_${DEPLOY_ENV_UPPER}"
          FLUSH_URL="${!FLUSH_URL_VAR}"

          if [ -z "$FLUSH_URL" ]; then
            echo "No cache flush URL configured for $DEPLOY_ENVIRONMENT"
            exit 0
          fi

          CACHE_KEY_VAR="CACHE_FLUSH_API_KEY_${DEPLOY_ENV_UPPER}"
          CACHE_KEY="${!CACHE_KEY_VAR}"

          if [ -z "$CACHE_KEY" ]; then
            echo "::warning::No cache flush API key configured for $DEPLOY_ENVIRONMENT"
            exit 0
          fi

          echo "Flushing cache for $DEPLOY_ENVIRONMENT environment..."
          curl -s -X POST "$FLUSH_URL" \
            -H "Content-Type: application/json" \
            -H "x-api-key: $CACHE_KEY" \
            -d "{\"userId\": \"$USER_ID_FOR_CACHE_FLUSH\"}" || echo "::warning::Cache flush failed (non-critical)"

      - name: Send Slack notification
        continue-on-error: true
        if: |
          steps.check_status.outputs.status == 'Succeeded' ||
          steps.check_status.outputs.status == 'Failed' ||
          steps.check_status.outputs.status == 'Canceled'
        run: |
          NOTIFY_TYPE="${{ steps.check_status.outputs.status }}"
          echo "Sending $NOTIFY_TYPE notification..."

          case "$NOTIFY_TYPE" in
            Succeeded)
              TITLE="✅ *Salesforce Deployment Succeeded*"
              FALLBACK="Salesforce deployment succeeded in $DEPLOY_ENVIRONMENT"
              ;;
            Failed)
              TITLE="❌ *Salesforce Deployment Failed*"
              FALLBACK="Salesforce deployment failed in $DEPLOY_ENVIRONMENT"
              ;;
            Canceled)
              TITLE="🚫 *Salesforce Deployment Canceled*"
              FALLBACK="Salesforce deployment canceled in $DEPLOY_ENVIRONMENT"
              ;;
          esac

          HEADER=$(jq -n --arg title "$TITLE" \
            '{type: "section", text: {type: "mrkdwn", text: $title}}')

          EXTRA_BLOCKS="[]"
          if [ "$NOTIFY_TYPE" = "Failed" ]; then
            COMPONENT_FAILURES=$(jq -r '
              [(.result.details.componentFailures // [])
               | if type == "array" then .[] else . end
               | "• \(.componentType): \(.fullName) — \(.problem // "unknown error")"]
              | .[0:10] | join("\n")' deploy_report.json 2>/dev/null || echo "")

            TEST_FAILURES=$(jq -r '
              [(.result.details.runTestResult.failures // [])
               | if type == "array" then .[] else . end
               | "• \(.name).\(.methodName): \(.message // "test failed")"]
              | .[0:5] | join("\n")' deploy_report.json 2>/dev/null || echo "")

            GENERAL_ERROR=$(jq -r '.result.errorMessage // .message // empty' deploy_report.json 2>/dev/null || echo "")

            NL=$'\n'
            ERROR_MESSAGE=""
            [ -n "$COMPONENT_FAILURES" ] && ERROR_MESSAGE="Component Failures:${NL}${COMPONENT_FAILURES}"
            if [ -n "$TEST_FAILURES" ]; then
              [ -n "$ERROR_MESSAGE" ] && ERROR_MESSAGE="${ERROR_MESSAGE}${NL}${NL}"
              ERROR_MESSAGE="${ERROR_MESSAGE}Test Failures:${NL}${TEST_FAILURES}"
            fi
            if [ -n "$GENERAL_ERROR" ] && [ "$GENERAL_ERROR" != "null" ]; then
              [ -n "$ERROR_MESSAGE" ] && ERROR_MESSAGE="${ERROR_MESSAGE}${NL}${NL}"
              ERROR_MESSAGE="${ERROR_MESSAGE}${GENERAL_ERROR}"
            fi
            [ -z "$ERROR_MESSAGE" ] && ERROR_MESSAGE="No specific error details available. Check Salesforce deployment status for more info."
            ERROR_MESSAGE=$(printf '%.1500s' "$ERROR_MESSAGE")

            EXTRA_BLOCKS=$(jq -n --arg error_msg "$ERROR_MESSAGE" \
              '[
                {type: "section", text: {type: "mrkdwn", text: ("*Error Details:*\n```" + $error_msg + "```")}},
                {type: "divider"},
                {type: "section", text: {type: "mrkdwn", text: "*🔄 To retry:* Click \u0027View Workflow\u0027 in the original message, then click *Re-run all jobs*"}}
              ]')
          fi

          BLOCKS=$(jq -n \
            --argjson header "$HEADER" \
            --argjson extra "$EXTRA_BLOCKS" \
            '[$header] + $extra')

          # -- Send --

          PAYLOAD=$(jq -n \
            --arg channel "$DEPLOY_SLACK_CHANNEL" \
            --arg fallback "$FALLBACK" \
            --arg thread_ts "${DEPLOY_SLACK_THREAD_TS:-}" \
            --argjson blocks "$BLOCKS" \
            '({
              channel: $channel,
              text: $fallback,
              blocks: $blocks
            } + if $thread_ts != "" then {thread_ts: $thread_ts} else {} end)')

          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer $SLACK_TOKEN" \
            -d "$PAYLOAD"

      - name: Delete artifact
        if: always() && env.DELETE_ARTIFACT == 'true'
        run: |
          echo "Deleting artifact ${{ matrix.artifact_name }}..."
          gh api --method DELETE "repos/${{ github.repository }}/actions/artifacts/${{ matrix.artifact_id }}" \
            || echo "::warning::Failed to delete artifact ${{ matrix.artifact_name }}"

      - name: Cleanup
        if: always()
        run: rm -rf artifact_temp artifact.zip deploy_report.json
